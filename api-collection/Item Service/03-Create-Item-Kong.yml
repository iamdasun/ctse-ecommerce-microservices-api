info:
  name: Create Item (via Kong)
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/items"
  auth: inherit
  headers:
    - key: Content-Type
      value: application/json
  body:
    mode: raw
    raw: |-
      {
        "name": "Wireless Headphones",
        "price": 79.99,
        "description": "High-quality wireless headphones"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
