info:
  name: Create Item (via Kong)
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/items"
  headers:
    - name: ""
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Camera"
      }
  auth: inherit

runtime:
  variables:
    - name: base_url
      value: http://localhost:8080

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
