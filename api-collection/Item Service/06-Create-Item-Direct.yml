info:
  name: Create Item (Direct)
  type: http
  seq: 6

http:
  method: POST
  url: "{{direct_base_url}}:{{item_port}}/items"
  auth: inherit
  headers:
    - key: Content-Type
      value: application/json
  body:
    mode: raw
    raw: |-
      {
        "name": "Gaming Mouse",
        "price": 49.99,
        "description": "RGB gaming mouse with 6 buttons"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
