_format_version: "3.0"
_transform: true

services:
  - name: item-service
    host: item-service
    port: 8081
    routes:
      - name: item-route
        paths:
          - /items
        strip_path: false
        preserve_host: true

  - name: order-service
    host: order-service
    port: 8082
    routes:
      - name: order-route
        paths:
          - /orders
        strip_path: false
        preserve_host: true

  - name: payment-service
    host: payment-service
    port: 8083
    routes:
      - name: payment-route
        paths:
          - /payments
        strip_path: false
        preserve_host: true
