_format_version: "3.0"
_transform: true

services:
  - name: item-service
    url: http://item-service:8081
    routes:
      - name: item-route
        paths:
          - /api/items
        strip_path: true
        preserve_host: true

  - name: order-service
    url: http://order-service:8082
    routes:
      - name: order-route
        paths:
          - /api/orders
        strip_path: true
        preserve_host: true

  - name: payment-service
    url: http://payment-service:8083
    routes:
      - name: payment-route
        paths:
          - /api/payments
        strip_path: true
        preserve_host: true
